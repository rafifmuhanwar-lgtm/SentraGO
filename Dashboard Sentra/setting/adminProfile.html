<html>
    <head>
        <link rel="stylesheet" href="/Dashboard Sentra/style.css">
    </head>
    <body>
        <div class="sidebar">

    <div class="logo">
        SentraGO
        <span>Admin</span>
    </div>

    <ul>

        <a href="/Dashboard Sentra/dashboard.html" style="text-decoration: none; color: white;"><li>🏠 Dashboard</li></a>
        <a href="/Dashboard Sentra/user.html" style="text-decoration: none; color:white;"><li>👤 User</li></a>
        <a href="/Dashboard Sentra/driver.html" style="text-decoration: none; color:white;"><li>🚗 Driver</li></a>
        <a href="/Dashboard Sentra/order.html" style="text-decoration: none; color:white;"><li>📦 Pesanan</li></a>
        <a href="/Dashboard Sentra/reports.html" style="text-decoration: none; color:white"><li>📈 Laporan</li></a>
        <a style="text-decoration: none; color: white;"><li class="active">⚙ Pengaturan</li></a>

    </ul>

</div>
<div class="main">

    <header>

        <h2>Settings</h2>

        <button class="btn-save">
            Simpan Perubahan
        </button>

    </header>

    <div class="settings-container">

        <!-- Sidebar -->

        <div class="settings-menu">

            <button class="setting-item active">
                Profil Admin
            </button>

            <a href="application.html" style="text-decoration: none; color: white;"><button class="setting-item">
                Aplikasi
            </button></a>

            <a href="security.html" style="text-decoration: none; color:white;"><button class="setting-item">
                Keamanan
            </button></a>

            <a href="notification.html" style="text-decoration: none; color:white"><button class="setting-item">
                Notifikasi
            </button></a>

            <a href="backupDb.html" style="text-decoration: none; color:white;"><button class="setting-item">
                Backup Database
            </button></a>

            <a href="about.html" style="text-decoration: none; color:white"><button class="setting-item">
                Tentang
            </button></a>

        </div>

        <!-- Content -->

        <div class="settings-content">

            <div class="profile-photo">

                <img
                    src="img/admin.png"
                    alt="Admin"
                >

                <button class="btn-upload">
                    Ganti Foto
                </button>

            </div>

            <div class="form-group">

                <label>Nama Admin</label>

                <input
                    type="text"
                    value="Administrator"
                >

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    value="admin@sentrago.id"
                >

            </div>

            <div class="form-group">

                <label>Nomor Telepon</label>

                <input
                    type="text"
                    value="081234567890"
                >

            </div>

            <div class="form-group">

                <label>Password Baru</label>

                <input
                    type="password"
                    placeholder="••••••••"
                >

            </div>

            <div class="form-group">

                <label>Konfirmasi Password</label>

                <input
                    type="password"
                    placeholder="••••••••"
                >

            </div>

        </div>

    </div>

</div>
    </body>
</html>
